{{ block title }}Waiting for participants{{ endblock }}

{{ block content }}
<p>Please wait while we match you with a group. This may take up to 2 minutes.</p>
<p>This page will advance automatically — you do not need to click anything.</p>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var observer = new MutationObserver(function() {
        var btn = document.querySelector('#otree-timeout-button, .otree-btn-pk');
        if (btn) {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopImmediatePropagation();
                // Set timeout flag and advance to LobbyTimeout page
                liveSend({'type': 'timeout'});
                window.location.href = "{{ next_url }}";
            }, true);
        }
    });
    observer.observe(document.body, { childList: true, subtree: true });
});
</script>
{{ endblock }}
