{% extends "global/Page.html" %}
{% block content %}

<style>
    .otree-timer {
        display: none;
    }
</style>

<h2>Administrator Review</h2>

<hr>

<table class="table" style="width:100%; border-collapse: collapse;">
<tr>
    <th>Citizen</th>
    <th>Activity record</th>
    <th>Your report</th>
</tr>

{% for r in rows %}
<tr>
    <td>Citizen {{ forloop.counter }}</td>
    <td>
        {% for b in r.blocks %}
            <span class="block"></span>
        {% endfor %}
    </td>
    <td>
        <input type="number" name="{{ r.field }}" min="0" required style="width:80px">
    </td>
</tr>
{% endfor %}

</table>

{{ next_button }}

<style>
.block {
    display: inline-block;
    width: 14px;
    height: 14px;
    background: #222;
    margin: 2px;
    border-radius: 2px;
}
</style>

{% endblock %}
